<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&amp;family=Crimson+Pro:ital,wght@0,300;1,300&amp;display=swap');
      .title { font-family: 'Cinzel Decorative', 'Cinzel', Georgia, serif; }
      .sub   { font-family: 'Crimson Pro', Georgia, serif; }
    </style>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#1a1530" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0812" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Fond -->
  <rect width="860" height="220" fill="#0a0812"/>
  <rect width="860" height="220" fill="url(#vignette)"/>

  <!-- Lignes décoratives -->
  <line x1="0" y1="10" x2="860" y2="10" stroke="#c9a84c" stroke-width="0.4" opacity="0.4"/>
  <line x1="0" y1="210" x2="860" y2="210" stroke="#c9a84c" stroke-width="0.4" opacity="0.4"/>

  <!-- Étoiles — dorées -->
  <circle cx="48"  cy="18"  r="1.2" fill="#c9a84c" opacity="0.7"/>
  <circle cx="820" cy="22"  r="1.0" fill="#c9a84c" opacity="0.6"/>
  <circle cx="740" cy="190" r="1.3" fill="#c9a84c" opacity="0.65"/>
  <circle cx="62"  cy="195" r="1.0" fill="#c9a84c" opacity="0.6"/>
  <circle cx="280" cy="28"  r="0.8" fill="#c9a84c" opacity="0.5"/>
  <circle cx="600" cy="15"  r="1.1" fill="#c9a84c" opacity="0.6"/>
  <circle cx="480" cy="200" r="0.9" fill="#c9a84c" opacity="0.55"/>
  <circle cx="830" cy="140" r="0.8" fill="#c9a84c" opacity="0.45"/>
  <circle cx="20"  cy="100" r="0.7" fill="#c9a84c" opacity="0.4"/>

  <!-- Étoiles — violet pâle -->
  <circle cx="310" cy="190" r="0.8" fill="#d4c9f0" opacity="0.45"/>
  <circle cx="720" cy="45"  r="1.0" fill="#d4c9f0" opacity="0.5"/>
  <circle cx="510" cy="180" r="0.7" fill="#d4c9f0" opacity="0.4"/>
  <circle cx="650" cy="195" r="0.9" fill="#d4c9f0" opacity="0.5"/>
  <circle cx="760" cy="110" r="0.6" fill="#d4c9f0" opacity="0.35"/>
  <circle cx="100" cy="160" r="0.8" fill="#d4c9f0" opacity="0.4"/>
  <circle cx="842" cy="72"  r="0.7" fill="#d4c9f0" opacity="0.4"/>
  <circle cx="34"  cy="55"  r="1.0" fill="#d4c9f0" opacity="0.45"/>
  <circle cx="390" cy="14"  r="0.6" fill="#d4c9f0" opacity="0.35"/>
  <circle cx="555" cy="205" r="0.8" fill="#d4c9f0" opacity="0.4"/>
  <circle cx="678" cy="168" r="0.6" fill="#d4c9f0" opacity="0.35"/>
  <circle cx="222" cy="205" r="0.7" fill="#d4c9f0" opacity="0.38"/>
  <circle cx="148" cy="18"  r="0.8" fill="#d4c9f0" opacity="0.42"/>
  <circle cx="440" cy="195" r="0.6" fill="#d4c9f0" opacity="0.33"/>
  <circle cx="800" cy="175" r="0.9" fill="#d4c9f0" opacity="0.42"/>
  <circle cx="240" cy="15"  r="0.7" fill="#d4c9f0" opacity="0.38"/>
  <circle cx="92"  cy="195" r="0.5" fill="#d4c9f0" opacity="0.3"/>
  <circle cx="852" cy="195" r="0.7" fill="#d4c9f0" opacity="0.38"/>
  <circle cx="695" cy="22"  r="0.8" fill="#d4c9f0" opacity="0.42"/>
  <circle cx="350" cy="205" r="0.6" fill="#d4c9f0" opacity="0.32"/>

  <!-- Sigil — centré gauche (cx=168, cy=108, scale 2.5) -->
  <g transform="translate(93, 33) scale(2.5)" opacity="0.9">
    <!-- Cercle extérieur -->
    <circle cx="30" cy="30" r="28" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.55"/>
    <!-- Cercle intérieur -->
    <circle cx="30" cy="30" r="20" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.4"/>
    <!-- Pentagramme -->
    <polygon
      points="30,5 36,22 54,22 39,33 45,50 30,40 15,50 21,33 6,22 24,22"
      stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.7"
    />
    <!-- Point central -->
    <circle cx="30" cy="30" r="4" fill="#c9a84c" opacity="0.8"/>
  </g>

  <!-- Séparateur vertical fin -->
  <line x1="290" y1="40" x2="290" y2="178" stroke="#c9a84c" stroke-width="0.3" opacity="0.3"/>

  <!-- Titre ARCANA ORACLE -->
  <text
    class="title"
    x="490" y="88"
    font-size="42"
    font-weight="700"
    fill="#c9a84c"
    text-anchor="middle"
    letter-spacing="8"
    opacity="0.95"
  >ARCANA</text>

  <text
    class="title"
    x="490" y="122"
    font-size="20"
    font-weight="400"
    fill="#c9a84c"
    text-anchor="middle"
    letter-spacing="12"
    opacity="0.7"
  >ORACLE</text>

  <!-- Ligne sous le titre -->
  <line x1="318" y1="133" x2="662" y2="133" stroke="#c9a84c" stroke-width="0.4" opacity="0.35"/>

  <!-- ✦ décoratifs -->
  <text x="320" y="107" font-size="10" fill="#c9a84c" opacity="0.7" text-anchor="middle">✦</text>
  <text x="660" y="107" font-size="10" fill="#c9a84c" opacity="0.7" text-anchor="middle">✦</text>

  <!-- Tagline -->
  <text
    class="sub"
    x="490" y="168"
    font-size="12"
    font-style="italic"
    fill="#c8b99a"
    text-anchor="middle"
    letter-spacing="2"
    opacity="0.55"
  >Derrière chaque arcane, un secret que l'ombre seule connaît</text>
</svg>
